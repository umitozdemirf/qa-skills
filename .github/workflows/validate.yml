name: Validate QA Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skills
        run: python3 scripts/validate_skills.py
      - name: Export command wrappers
        run: python3 scripts/export_agent_commands.py
